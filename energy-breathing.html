<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="נשימה">
<meta name="theme-color" content="#0a1628">
<title>נשימה מכוונת</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@200;300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0a1628; --surface:#112240; --surface2:#1a3258;
    --blue:#4da6ff; --sky:#90caf9; --white:#e8f4fd; --dim:#5a7fa8;
    --glow:rgba(77,166,255,0.3); --exhale:#4dd0e1; --hold:#f0c060;
    --red:#c0392b; --sleep:#9b7fd4; --sleep-glow:rgba(155,127,212,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; overflow:hidden; }
  body {
    background:var(--bg); color:var(--white); font-family:'Heebo',sans-serif;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    user-select:none; position:relative;
  }
  body::before {
    content:''; position:fixed; width:500px; height:500px; top:-200px; right:-150px;
    background:radial-gradient(circle,rgba(77,166,255,0.06) 0%,transparent 70%); pointer-events:none;
  }

  .container {
    display:flex; flex-direction:column; align-items:center;
    width:100%; max-width:400px; padding:0 12px;
    height:100vh; height:100dvh; justify-content:space-evenly;
    padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom);
    position:relative; z-index:1;
  }

  .app-title { font-family:'Bebas Neue',sans-serif; font-size:13px; letter-spacing:0.28em; color:var(--dim); }

  /* ── Session grid 3 rows ── */
  .session-grid { display:flex; flex-direction:column; gap:5px; width:100%; }
  .session-row  { display:flex; justify-content:center; gap:5px; }
  .tab {
    width:62px; height:56px; background:var(--surface);
    border:2px solid transparent; border-radius:13px;
    color:var(--dim); cursor:pointer; transition:all 0.2s;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; flex-shrink:0;
  }
  .tab .tab-icon { font-size:18px; line-height:1; }
  .tab .tab-name { font-size:8px; font-weight:500; color:var(--sky); letter-spacing:0.02em; line-height:1; }
  .tab.active { border-color:var(--blue); background:var(--surface2); box-shadow:0 3px 12px rgba(77,166,255,0.25); }
  .tab.active .tab-name { color:var(--blue); }
  .tab.active.sleep-tab { border-color:var(--sleep); box-shadow:0 3px 12px rgba(155,127,212,0.3); }
  .tab.active.sleep-tab .tab-name { color:var(--sleep); }

  /* Wim Hof level */
  .level-toggle { display:none; gap:6px; width:100%; }
  .level-toggle.visible { display:flex; }
  .level-btn {
    flex:1; padding:6px; border:2px solid var(--surface2); border-radius:9px;
    background:var(--surface); color:var(--dim); font-family:'Heebo',sans-serif;
    font-size:10px; cursor:pointer; transition:all 0.2s; text-align:center;
  }
  .level-btn.active { border-color:var(--blue); color:var(--blue); }

  /* ── Description panel (outside circle) ── */
  .desc-panel {
    width:100%; background:var(--surface);
    border:1px solid rgba(77,166,255,0.12); border-radius:14px;
    padding:12px 14px; display:flex; flex-direction:column; gap:5px;
  }
  .desc-panel.hidden { display:none; }
  .desc-row { display:flex; gap:8px; align-items:flex-start; }
  .desc-label {
    font-family:'Bebas Neue',sans-serif; font-size:10px; letter-spacing:0.1em;
    color:var(--blue); white-space:nowrap; padding-top:1px; min-width:44px;
  }
  .desc-val { font-size:10px; font-weight:300; color:var(--sky); line-height:1.5; }

  /* ── Circle ── */
  .circle-area { position:relative; width:162px; height:162px; flex-shrink:0; }
  .ring-svg { position:absolute; inset:0; transform:rotate(-90deg); }
  .ring-bg { fill:none; stroke:var(--surface2); stroke-width:8; }
  .ring-progress {
    fill:none; stroke:var(--blue); stroke-width:8; stroke-linecap:round;
    stroke-dasharray:434; stroke-dashoffset:434;
    transition:stroke-dashoffset 0.1s linear, stroke 0.4s ease;
    filter:drop-shadow(0 0 8px rgba(77,166,255,0.55));
  }
  .ring-progress.exhale { stroke:var(--exhale); filter:drop-shadow(0 0 8px rgba(77,208,225,0.55)); }
  .ring-progress.hold   { stroke:var(--hold);   filter:drop-shadow(0 0 8px rgba(240,192,96,0.55)); }
  .ring-progress.sleep  { stroke:var(--sleep);  filter:drop-shadow(0 0 8px rgba(155,127,212,0.55)); }

  .circle-inner {
    position:absolute; inset:14px; border-radius:50%; background:var(--surface);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1px; border:1px solid rgba(77,166,255,0.12);
  }
  .phase-label {
    font-family:'Bebas Neue',sans-serif; font-size:17px; letter-spacing:0.1em;
    color:var(--blue); transition:color 0.4s; line-height:1;
  }
  .phase-label.exhale { color:var(--exhale); }
  .phase-label.hold   { color:var(--hold); }
  .phase-label.sleep  { color:var(--sleep); }
  .phase-label.paused { color:var(--dim); }
  .countdown { font-family:'Bebas Neue',sans-serif; font-size:52px; line-height:1; color:var(--white); }
  .rep-counter { font-size:11px; font-weight:700; color:var(--blue); letter-spacing:0.05em; }

  /* ── Phase indicators — single row of 5 ── */
  .phase-indicators {
    display:flex; gap:6px; width:100%;
  }
  .pi {
    flex:1; padding:7px 4px; border-radius:10px;
    background:var(--surface); border:2px solid transparent;
    display:flex; flex-direction:column; align-items:center; gap:2px;
    transition:all 0.3s;
  }
  .pi .pi-val { font-family:'Bebas Neue',sans-serif; font-size:16px; color:var(--dim); line-height:1; }
  .pi .pi-key { font-size:7px; color:var(--dim); letter-spacing:0.08em; text-transform:uppercase; font-weight:300; }

  /* Active state */
  .pi.active-inhale { border-color:var(--blue); background:rgba(77,166,255,0.1); box-shadow:0 0 10px rgba(77,166,255,0.25); }
  .pi.active-inhale .pi-val, .pi.active-inhale .pi-key { color:var(--blue); }
  .pi.active-exhale { border-color:var(--exhale); background:rgba(77,208,225,0.1); box-shadow:0 0 10px rgba(77,208,225,0.25); }
  .pi.active-exhale .pi-val, .pi.active-exhale .pi-key { color:var(--exhale); }
  .pi.active-hold { border-color:var(--hold); background:rgba(240,192,96,0.1); box-shadow:0 0 10px rgba(240,192,96,0.25); }
  .pi.active-hold .pi-val, .pi.active-hold .pi-key { color:var(--hold); }
  .pi.active-sleep { border-color:var(--sleep); background:rgba(155,127,212,0.1); box-shadow:0 0 10px rgba(155,127,212,0.25); }
  .pi.active-sleep .pi-val, .pi.active-sleep .pi-key { color:var(--sleep); }
  .pi.active-reps { border-color:var(--blue); background:rgba(77,166,255,0.1); }
  .pi.active-reps .pi-val, .pi.active-reps .pi-key { color:var(--blue); }

  /* ── Done ── */
  .done-msg { display:none; flex-direction:column; align-items:center; gap:3px; text-align:center; }
  .done-msg.show { display:flex; }
  .done-big { font-family:'Bebas Neue',sans-serif; font-size:32px; color:var(--blue); letter-spacing:0.1em; }
  .done-sub { font-size:11px; color:var(--dim); font-weight:300; line-height:1.5; }

  /* ── Buttons ── */
  .btn-main {
    width:100%; padding:15px; border:none; border-radius:14px;
    font-family:'Bebas Neue',sans-serif; font-size:23px; letter-spacing:0.14em;
    cursor:pointer; transition:all 0.2s; background:var(--blue); color:#051020;
    box-shadow:0 4px 20px rgba(77,166,255,0.4);
  }
  .btn-main:active { transform:scale(0.97); }
  .btn-main.running { background:var(--red); color:#fff; box-shadow:0 4px 18px rgba(192,57,43,0.4); }
  .btn-main.sleep-mode { background:var(--sleep); color:#0d0520; box-shadow:0 4px 18px var(--sleep-glow); }

  .btn-secondary-row { display:flex; gap:10px; width:100%; align-items:center; }
  .btn-pause {
    flex:1; padding:11px; border:2px solid rgba(77,166,255,0.2); border-radius:12px;
    background:var(--surface2); color:var(--sky); font-family:'Bebas Neue',sans-serif;
    font-size:15px; letter-spacing:0.1em; cursor:pointer; transition:all 0.2s;
    opacity:0.4; pointer-events:none;
  }
  .btn-pause.active { opacity:1; pointer-events:all; }
  .btn-pause.active:active { transform:scale(0.97); }
  .btn-pause.paused { color:var(--blue); border-color:var(--blue); background:rgba(77,166,255,0.08); opacity:1; pointer-events:all; }

  .sound-row { display:flex; align-items:center; gap:6px; }
  .sound-label { font-size:10px; color:var(--dim); font-weight:300; }
  .sound-toggle { width:36px; height:19px; border-radius:10px; background:var(--surface2); border:none; cursor:pointer; position:relative; transition:background 0.2s; }
  .sound-toggle.on { background:var(--blue); }
  .sound-toggle::after { content:''; position:absolute; top:3px; right:3px; width:13px; height:13px; border-radius:50%; background:#fff; transition:right 0.2s; }
  .sound-toggle.on::after { right:20px; }

  @keyframes pulseGlow { 0%,100%{box-shadow:0 0 0 0 var(--glow);}50%{box-shadow:0 0 0 10px transparent;} }
  .circle-inner.pulsing { animation:pulseGlow 1.2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <div class="app-title">💧 נשימה מכוונת</div>

  <!-- Session grid -->
  <div class="session-grid">
    <div class="session-row">
      <button class="tab active" id="tab0" onclick="selectSession(0)"><span class="tab-icon">☀️</span><span class="tab-name">צהריים</span></button>
      <button class="tab" id="tab1" onclick="selectSession(1)"><span class="tab-icon">⚡</span><span class="tab-name">16:00</span></button>
      <button class="tab" id="tab2" onclick="selectSession(2)"><span class="tab-icon">🧠</span><span class="tab-name">פוקוס</span></button>
      <button class="tab" id="tab3" onclick="selectSession(3)"><span class="tab-icon">🫁</span><span class="tab-name">ריאות</span></button>
    </div>
    <div class="session-row">
      <button class="tab" id="tab4" onclick="selectSession(4)"><span class="tab-icon">🛡️</span><span class="tab-name">חיסון</span></button>
      <button class="tab" id="tab5" onclick="selectSession(5)"><span class="tab-icon">💪</span><span class="tab-name">מניעה</span></button>
      <button class="tab sleep-tab" id="tab6" onclick="selectSession(6)"><span class="tab-icon">🌙</span><span class="tab-name">שינה</span></button>
    </div>
    <div class="session-row">
      <button class="tab" id="tab7" onclick="selectSession(7)"><span class="tab-icon">🤕</span><span class="tab-name">מתח</span></button>
      <button class="tab" id="tab8" onclick="selectSession(8)"><span class="tab-icon">🌀</span><span class="tab-name">מיגרנה</span></button>
      <button class="tab" id="tab9" onclick="selectSession(9)"><span class="tab-icon">😵</span><span class="tab-name">עייפות</span></button>
    </div>
  </div>

  <!-- Wim Hof level -->
  <div class="level-toggle" id="levelToggle">
    <button class="level-btn active" id="lvl0" onclick="selectLevel(0)">🔥 קל — 15 שאיפות</button>
    <button class="level-btn" id="lvl1" onclick="selectLevel(1)">🔥🔥 מלא — 20 שאיפות</button>
  </div>

  <!-- Description panel -->
  <div class="desc-panel" id="descPanel">
    <div class="desc-row"><span class="desc-label">מתי:</span><span class="desc-val" id="dWhen"></span></div>
    <div class="desc-row"><span class="desc-label">מטרה:</span><span class="desc-val" id="dGoal"></span></div>
    <div class="desc-row"><span class="desc-label">מבוסס:</span><span class="desc-val" id="dBasis"></span></div>
    <div class="desc-row"><span class="desc-label">התרגיל:</span><span class="desc-val" id="dHow"></span></div>
  </div>

  <!-- Circle (shown during exercise) -->
  <div class="circle-area" id="circleArea" style="display:none">
    <svg class="ring-svg" viewBox="0 0 162 162">
      <circle class="ring-bg" cx="81" cy="81" r="69"/>
      <circle class="ring-progress" id="ring" cx="81" cy="81" r="69"/>
    </svg>
    <div class="circle-inner" id="circleInner">
      <div class="phase-label" id="phaseLabel">שאיפה</div>
      <div class="countdown"   id="countdown">—</div>
      <div class="rep-counter" id="repCounter">חזרה 1/8</div>
    </div>
  </div>

  <!-- Phase indicators — 5 boxes -->
  <div class="phase-indicators">
    <div class="pi" id="pi-inhale">
      <div class="pi-val" id="piv-inhale">—</div>
      <div class="pi-key">שאיפה</div>
    </div>
    <div class="pi" id="pi-hold1">
      <div class="pi-val" id="piv-hold1">—</div>
      <div class="pi-key">עצירה</div>
    </div>
    <div class="pi" id="pi-exhale">
      <div class="pi-val" id="piv-exhale">—</div>
      <div class="pi-key">נשיפה</div>
    </div>
    <div class="pi" id="pi-hold2">
      <div class="pi-val" id="piv-hold2">—</div>
      <div class="pi-key">עצירה</div>
    </div>
    <div class="pi" id="pi-reps">
      <div class="pi-val" id="piv-reps">—</div>
      <div class="pi-key">חזרות</div>
    </div>
  </div>

  <!-- Done -->
  <div class="done-msg" id="doneMsg">
    <div class="done-big">✓ כל הכבוד!</div>
    <div class="done-sub" id="doneSub"></div>
  </div>

  <!-- Buttons -->
  <button class="btn-main" id="startBtn" onclick="handleStart()">התחל</button>
  <div class="btn-secondary-row">
    <button class="btn-pause" id="pauseBtn" onclick="handlePause()">⏸ השהה</button>
    <div class="sound-row">
      <span class="sound-label">סאונד</span>
      <button class="sound-toggle on" id="soundToggle" onclick="toggleSound()"></button>
    </div>
  </div>

</div>
<script>
// ── Audio ──────────────────────────────────────────────
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null,soundOn=true;
function getAudioCtx(){if(!audioCtx)audioCtx=new AudioCtx();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function playTone(freq,type,dur){if(!soundOn)return;try{const ctx=getAudioCtx(),o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.setValueAtTime(freq,ctx.currentTime);g.gain.setValueAtTime(0.15,ctx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);o.start(ctx.currentTime);o.stop(ctx.currentTime+dur);}catch(e){}}
function soundInhale(){playTone(528,'sine',0.5);}
function soundHold(){playTone(396,'triangle',0.35);}
function soundExhale(){playTone(285,'sine',0.6);}
function soundSleepInhale(){playTone(432,'sine',0.7);}
function soundSleepExhale(){playTone(220,'sine',0.9);}
function toggleSound(){soundOn=!soundOn;document.getElementById('soundToggle').className='sound-toggle'+(soundOn?' on':'');}

// ── Descriptions ───────────────────────────────────────
const DESCS=[
  {when:'אחרי ארוחת הצהריים',goal:'החזרת אנרגיה וריכוז',basis:'הפעלת מערכת העצבים הסימפתטית דרך שאיפה ארוכה',how:'שאף עמוק 5 שניות דרך האף, נשוף חזק 3 שניות דרך הפה — 8 פעמים'},
  {when:'סביב 16:00, נפילת אנרגיה',goal:'עוררות מהירה ותגובה לנפילה הצירקדית',basis:'שאיפה ארוכה + נשיפה חדה מגבירים אדרנלין',how:'שאף עמוק 6 שניות, נשוף בחדות 2 שניות — 10 פעמים'},
  {when:'לפני עבודה הדורשת ריכוז',goal:'חידוד חשיבה וקבלת החלטות',basis:'עצירה ארוכה מגבירה חמצון בקורטקס הקדם מצחי',how:'שאף 4 שניות, עצור 8 שניות, נשוף 5 שניות — בנוחות, 8 פעמים'},
  {when:'פעם ביום, בריא בלבד',goal:'הגדלת נפח ריאות וחיזוק הסרעפת',basis:'נשימה בשלושה שלבים מפעילה את כל נפח הריאות',how:'שאף בטן 3 שנ׳ + חזה 3 שנ׳ + כתפיים 2 שנ׳, עצור 20, נשוף 8 — 6 פעמים'},
  {when:'בזמן מחלה, שפעת, הצטננות',goal:'סיוע לגוף להתמקד בריפוי',basis:'Box Breathing מוריד קורטיזול ומפחית דלקתיות',how:'שאף 4, עצור 4, נשוף 4, עצור 4 — 6 פעמים. נשום בנוחות, אל תאמץ'},
  {when:'בריא, פעם ביום בבוקר',goal:'חיזוק מערכת החיסון מניעתי',basis:'שיטת Wim Hof — מוכחת מדעית לשחרור אדרנלין',how:'שאיפות מהירות ועמוקות, עצירה, שאיפה מלאה. רק בישיבה/שכיבה'},
  {when:'20-30 דקות לפני השינה',goal:'הרגעת הגוף והנפש לקראת שינה',basis:'טכניקת 4-7-8 של ד"ר Weil — מפעילה פאראסימפתטי',how:'שאף 4, עצור 7, נשוף 8 לאט — 8 פעמים. בשכיבה, עיניים עצומות'},
  {when:'כאב ראש ממתח, עבודה, לחץ',goal:'שחרור מתח שרירי והרחבת כלי דם',basis:'נשיפה ארוכה מורידה לחץ דם ומרפה שרירי הצוואר',how:'שאף 4, עצור 4, נשוף לאט 6 — 8 פעמים. הרפי כתפיים וצוואר'},
  {when:'כאב ראש ממיגרנה',goal:'ייצוב מחזור הדם והפחתת עוצמת הכאב',basis:'נשימה איטית ללא עצירות מייצבת שינויים בכלי דם',how:'שאף לאט 4, נשוף לאט 6 — ללא עצירה. שכב, עצום עיניים, 10 פעמים'},
  {when:'כאב ראש מעייפות, שעות מסך',goal:'חמצון מהיר של המוח',basis:'שאיפות מהירות מעלות חמצן בדם תוך דקות',how:'15 שאיפות מהירות ועמוקות, עצור עד שחייב לנשום, שאף מלא ועצור 5 שנ׳ — 3 סבבים. בישיבה בלבד'},
];

// ── Sessions ───────────────────────────────────────────
function buildSessions(wl){
  const wc=wl===0?15:20,wh=wl===0?15:20;
  return[
    {done:'תרגיש את האנרגיה עוד שניות ספורות ☀️',reps:8,isSleep:false,
     phases:[{type:'inhale',dur:5},{type:'exhale',dur:3}],
     pi:{inhale:5,hold1:'—',exhale:3,hold2:'—',reps:8}},
    {done:'מערכת העצבים מופעלת ⚡',reps:10,isSleep:false,
     phases:[{type:'inhale',dur:6},{type:'exhale',dur:2}],
     pi:{inhale:6,hold1:'—',exhale:2,hold2:'—',reps:10}},
    {done:'הראש צלול ומוכן לחשוב 🧠',reps:8,isSleep:false,
     phases:[{type:'inhale',dur:4},{type:'hold',dur:8},{type:'exhale',dur:5}],
     pi:{inhale:4,hold1:8,exhale:5,hold2:'—',reps:8}},
    {done:'ריאות חזקות יותר 🫁',reps:6,isSleep:false,
     phases:[{type:'inhale3',dur:8},{type:'hold',dur:20},{type:'exhale',dur:8}],
     pi:{inhale:'8×3',hold1:20,exhale:8,hold2:'—',reps:6}},
    {done:'הגוף מוכן להתמקד בריפוי 🛡️',reps:6,isSleep:false,
     phases:[{type:'inhale',dur:4},{type:'hold',dur:4},{type:'exhale',dur:4},{type:'hold',dur:4}],
     pi:{inhale:4,hold1:4,exhale:4,hold2:4,reps:6}},
    {done:'מערכת החיסון מופעלת 💪',reps:3,isSleep:false,
     phases:[{type:'wim_inhales',count:wc},{type:'wim_hold_empty',dur:wh},{type:'wim_hold_full',dur:10}],
     pi:{inhale:wc+'×',hold1:wh,exhale:'—',hold2:10,reps:3}},
    {done:'לילה טוב 🌙',reps:8,isSleep:true,
     phases:[{type:'sleep_inhale',dur:4},{type:'sleep_hold',dur:7},{type:'sleep_exhale',dur:8}],
     pi:{inhale:4,hold1:7,exhale:8,hold2:'—',reps:8}},
    {done:'כאב הראש אמור להתחיל לשחרר 🤕',reps:8,isSleep:false,
     phases:[{type:'inhale',dur:4},{type:'hold',dur:4},{type:'exhale',dur:6}],
     pi:{inhale:4,hold1:4,exhale:6,hold2:'—',reps:8}},
    {done:'המיגרנה אמורה להיחלש 🌀',reps:10,isSleep:true,
     phases:[{type:'sleep_inhale',dur:4},{type:'sleep_exhale',dur:6}],
     pi:{inhale:4,hold1:'—',exhale:6,hold2:'—',reps:10}},
    {done:'המוח מחומצן — הכאב אמור לשקוע 😵',reps:3,isSleep:false,
     phases:[{type:'wim_inhales',count:15},{type:'wim_hold_empty',dur:15},{type:'wim_hold_full',dur:5}],
     pi:{inhale:'15×',hold1:15,exhale:'—',hold2:5,reps:3}},
  ];
}

// ── State ──────────────────────────────────────────────
let sessions=buildSessions(0),sessionIdx=0,wimLevel=0;
let running=false,paused=false,intervalId=null,repsDone=0;
let phaseQueue=[],phaseQueueIdx=0,subPhase=null,timeLeft=0,phaseDuration=0;
const CIRC=2*Math.PI*69; // 433.5

const ring=document.getElementById('ring');
const phaseLabel=document.getElementById('phaseLabel');
const countdown=document.getElementById('countdown');
const repCounter=document.getElementById('repCounter');
const startBtn=document.getElementById('startBtn');
const pauseBtn=document.getElementById('pauseBtn');
const circleInner=document.getElementById('circleInner');
const circleArea=document.getElementById('circleArea');
const descPanel=document.getElementById('descPanel');
const doneMsg=document.getElementById('doneMsg');
const doneSub=document.getElementById('doneSub');

ring.style.strokeDasharray=CIRC;
ring.style.strokeDashoffset=CIRC;

// ── Phase indicator logic ──────────────────────────────
// Map phase types to indicator ids
const PHASE_TO_PI={
  'inhale':'inhale','inhale3':'inhale',
  'hold':'hold1','wim_hold_empty':'hold1',
  'exhale':'exhale','sleep_inhale':'inhale','sleep_exhale':'exhale',
  'sleep_hold':'hold1','wim_hold_full':'hold2','wim_inhale':'inhale',
};
const PI_TO_COLOR={inhale:'inhale',hold1:'hold',exhale:'exhale',hold2:'hold',reps:'reps'};

function clearPiHighlights(){
  ['inhale','hold1','exhale','hold2','reps'].forEach(id=>{
    document.getElementById('pi-'+id).className='pi';
  });
}

function highlightPi(phaseType){
  clearPiHighlights();
  const piId=PHASE_TO_PI[phaseType]||null;
  if(!piId)return;
  const isSleep=sessions[sessionIdx].isSleep;
  const colorClass=isSleep?'sleep':(piId==='exhale'?'exhale':piId.startsWith('hold')?'hold':'inhale');
  document.getElementById('pi-'+piId).className='pi active-'+colorClass;
}

function highlightReps(){
  clearPiHighlights();
  document.getElementById('pi-reps').className='pi active-reps';
}

function updatePiValues(){
  const p=sessions[sessionIdx].pi;
  document.getElementById('piv-inhale').textContent=p.inhale;
  document.getElementById('piv-hold1').textContent=p.hold1;
  document.getElementById('piv-exhale').textContent=p.exhale;
  document.getElementById('piv-hold2').textContent=p.hold2;
  document.getElementById('piv-reps').textContent=p.reps;
}

// ── UI helpers ─────────────────────────────────────────
function showDesc(){
  descPanel.classList.remove('hidden');
  circleArea.style.display='none';
}
function showCircle(){
  descPanel.classList.add('hidden');
  circleArea.style.display='block';
}

function selectSession(idx){
  if(running||paused)stopTimer();
  sessionIdx=idx;
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.getElementById('levelToggle').className='level-toggle'+(idx===5?' visible':'');
  const isSleep=sessions[idx].isSleep;
  startBtn.className='btn-main'+(isSleep?' sleep-mode':'');
  // Fill description
  const d=DESCS[idx];
  document.getElementById('dWhen').textContent=d.when;
  document.getElementById('dGoal').textContent=d.goal;
  document.getElementById('dBasis').textContent=d.basis;
  document.getElementById('dHow').textContent=d.how;
  showDesc();
  doneMsg.classList.remove('show');
  ring.style.strokeDashoffset=CIRC;ring.className='ring-progress';
  circleInner.classList.remove('pulsing');
  startBtn.textContent='התחל';
  pauseBtn.className='btn-pause';
  clearPiHighlights();
  updatePiValues();
}

function selectLevel(lvl){
  wimLevel=lvl;sessions=buildSessions(lvl);
  document.getElementById('lvl0').className='level-btn'+(lvl===0?' active':'');
  document.getElementById('lvl1').className='level-btn'+(lvl===1?' active':'');
  updatePiValues();
}

function resetDisplay(){
  showDesc();
  const d=DESCS[sessionIdx];
  document.getElementById('dWhen').textContent=d.when;
  document.getElementById('dGoal').textContent=d.goal;
  document.getElementById('dBasis').textContent=d.basis;
  document.getElementById('dHow').textContent=d.how;
  ring.style.strokeDashoffset=CIRC;ring.className='ring-progress';
  circleInner.classList.remove('pulsing');doneMsg.classList.remove('show');
  startBtn.textContent='התחל';
  startBtn.className='btn-main'+(sessions[sessionIdx].isSleep?' sleep-mode':'');
  pauseBtn.className='btn-pause';
  clearPiHighlights();
}

// ── Controls ───────────────────────────────────────────
function handleStart(){if(running)stopTimer();else startTimer();}
function handlePause(){if(!running&&!paused)return;paused?resumeTimer():pauseTimer();}

function startTimer(){
  running=true;paused=false;repsDone=0;
  doneMsg.classList.remove('show');showCircle();
  startBtn.textContent='עצור';startBtn.className='btn-main running';
  pauseBtn.className='btn-pause active';pauseBtn.textContent='⏸ השהה';
  startRep();
}
function pauseTimer(){
  paused=true;clearInterval(intervalId);
  phaseLabel.textContent='השהיה';phaseLabel.className='phase-label paused';
  circleInner.classList.remove('pulsing');
  pauseBtn.textContent='▶ המשך';pauseBtn.className='btn-pause paused';
  clearPiHighlights();
}
function resumeTimer(){
  paused=false;pauseBtn.textContent='⏸ השהה';pauseBtn.className='btn-pause active';
  if(subPhase){applyStyle(subPhase);highlightPi(subPhase);}
  runInterval();
}
function stopTimer(){running=false;paused=false;clearInterval(intervalId);resetDisplay();}

function startRep(){
  phaseQueue=[...sessions[sessionIdx].phases];phaseQueueIdx=0;
  repCounter.textContent=`חזרה ${repsDone+1}/${sessions[sessionIdx].reps}`;
  highlightReps();
  setTimeout(()=>runNextPhase(),400);
}

function runNextPhase(){
  if(!running||paused)return;
  if(phaseQueueIdx>=phaseQueue.length){
    repsDone++;const s=sessions[sessionIdx];
    if(repsDone>=s.reps){finishSession();return;}
    repCounter.textContent=`חזרה ${repsDone+1}/${s.reps}`;
    highlightReps();
    phaseQueue=[...s.phases];phaseQueueIdx=0;
    setTimeout(()=>runNextPhase(),300);
    return;
  }
  executePhase(phaseQueue[phaseQueueIdx++]);
}

function executePhase(p){
  if(p.type==='wim_inhales')runWimInhales(p.count,0);
  else if(p.type==='inhale3')runInhale3();
  else{
    applyStyle(p.type);playSoundFor(p.type);
    highlightPi(p.type);
    subPhase=p.type;phaseDuration=p.dur;timeLeft=p.dur;
    ring.style.strokeDashoffset=CIRC;clearInterval(intervalId);runInterval();
  }
}

function playSoundFor(t){
  if(t==='inhale'||t==='inhale3')soundInhale();
  else if(t==='exhale')soundExhale();
  else if(t==='sleep_inhale')soundSleepInhale();
  else if(t==='sleep_exhale')soundSleepExhale();
  else soundHold();
}

function applyStyle(t){
  circleInner.classList.remove('pulsing');
  switch(t){
    case'inhale':phaseLabel.textContent='שאיפה';phaseLabel.className='phase-label';ring.className='ring-progress';circleInner.classList.add('pulsing');break;
    case'exhale':phaseLabel.textContent='נשיפה';phaseLabel.className='phase-label exhale';ring.className='ring-progress exhale';break;
    case'hold':phaseLabel.textContent='עצור';phaseLabel.className='phase-label hold';ring.className='ring-progress hold';break;
    case'wim_hold_empty':phaseLabel.textContent='ריאות ריקות';phaseLabel.className='phase-label hold';ring.className='ring-progress hold';break;
    case'wim_hold_full':phaseLabel.textContent='ריאות מלאות';phaseLabel.className='phase-label hold';ring.className='ring-progress hold';break;
    case'sleep_inhale':phaseLabel.textContent='שאיפה';phaseLabel.className='phase-label sleep';ring.className='ring-progress sleep';circleInner.classList.add('pulsing');break;
    case'sleep_hold':phaseLabel.textContent='עצור';phaseLabel.className='phase-label sleep';ring.className='ring-progress sleep';break;
    case'sleep_exhale':phaseLabel.textContent='נשיפה';phaseLabel.className='phase-label sleep';ring.className='ring-progress sleep';break;
    case'wim_inhale':phaseLabel.textContent='שאיפה מהירה';phaseLabel.className='phase-label';ring.className='ring-progress';circleInner.classList.add('pulsing');break;
  }
}

function runInterval(){
  intervalId=setInterval(()=>{
    timeLeft-=0.1;countdown.textContent=Math.ceil(timeLeft);
    ring.style.strokeDashoffset=CIRC*(timeLeft/phaseDuration);
    if(timeLeft<=0.05){clearInterval(intervalId);runNextPhase();}
  },100);
}

function runWimInhales(total,current){
  if(!running||paused){subPhase='wim_inhale';return;}
  if(current>=total){runNextPhase();return;}
  subPhase='wim_inhale';applyStyle('wim_inhale');highlightPi('wim_inhale');
  countdown.textContent=total-current;
  repCounter.textContent=`שאיפה ${current+1}/${total}`;
  soundInhale();phaseDuration=1.2;timeLeft=1.2;ring.style.strokeDashoffset=CIRC;
  clearInterval(intervalId);
  intervalId=setInterval(()=>{timeLeft-=0.1;ring.style.strokeDashoffset=CIRC*(timeLeft/phaseDuration);if(timeLeft<=0.05){clearInterval(intervalId);runWimInhales(total,current+1);}},100);
}

function runInhale3(){
  const parts=[{label:'שאיפה — בטן',dur:3},{label:'שאיפה — חזה',dur:3},{label:'שאיפה — כתפיים',dur:2}];
  let idx=0;applyStyle('inhale');soundInhale();highlightPi('inhale');
  function runPart(){
    if(!running||paused)return;
    if(idx>=parts.length){runNextPhase();return;}
    const p=parts[idx++];phaseLabel.textContent=p.label;
    phaseDuration=p.dur;timeLeft=p.dur;ring.style.strokeDashoffset=CIRC;
    clearInterval(intervalId);
    intervalId=setInterval(()=>{timeLeft-=0.1;countdown.textContent=Math.ceil(timeLeft);ring.style.strokeDashoffset=CIRC*(timeLeft/phaseDuration);if(timeLeft<=0.05){clearInterval(intervalId);runPart();}},100);
  }
  runPart();
}

function finishSession(){
  running=false;paused=false;clearInterval(intervalId);
  const s=sessions[sessionIdx];
  phaseLabel.textContent='סיום';phaseLabel.className='phase-label';
  countdown.textContent='✓';circleInner.classList.remove('pulsing');
  ring.style.strokeDashoffset=0;
  repCounter.textContent=`${s.reps}/${s.reps} חזרות`;
  doneSub.textContent=s.done;doneMsg.classList.add('show');
  startBtn.textContent='שוב';
  startBtn.className='btn-main'+(s.isSleep?' sleep-mode':'');
  pauseBtn.className='btn-pause';
  clearPiHighlights();
}

document.addEventListener('touchstart',()=>{try{getAudioCtx();}catch(e){}},{once:true});
document.addEventListener('click',()=>{try{getAudioCtx();}catch(e){}},{once:true});

// Init
selectSession(0);
</script>
</body>
