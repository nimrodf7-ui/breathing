<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="נשימה">
<meta name="theme-color" content="#1a2e1f">
<title>נשימה מכוונת</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Heebo:wght@200;300;400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a2e1f;
    --surface: #22382a;
    --surface2: #2a4535;
    --green: #4caf7d;
    --sky: #a8d5b5;
    --white: #eef5f0;
    --dim: #6a8f76;
    --glow: rgba(76,175,125,0.3);
    --exhale: #68c2a0;
    --hold: #f0c060;
    --red: #c0392b;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  body {
    background: var(--bg);
    color: var(--white);
    font-family: 'Heebo', sans-serif;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
    user-select: none;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  }

  body::before {
    content:'';
    position:fixed;
    width:500px; height:500px;
    top:-180px; left:-150px;
    background: radial-gradient(circle, rgba(76,175,125,0.07) 0%, transparent 70%);
    pointer-events:none;
    z-index:0;
  }

  .container {
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
    padding:18px 16px 28px;
    width:100%;
    max-width:420px;
    position:relative;
    z-index:1;
  }

  .app-title {
    font-family:'Bebas Neue', sans-serif;
    font-size:14px;
    letter-spacing:0.28em;
    color:var(--dim);
  }

  /* Session grid 2x3 */
  .session-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:7px;
    width:100%;
  }

  .tab {
    padding:11px 8px;
    background:var(--surface);
    border:2px solid transparent;
    border-radius:11px;
    color:var(--dim);
    font-family:'Heebo', sans-serif;
    cursor:pointer;
    transition:all 0.22s;
    text-align:center;
    line-height:1.4;
  }
  .tab .tab-icon { font-size:16px; display:block; margin-bottom:2px; }
  .tab .tab-name { display:block; font-size:12px; font-weight:600; color:var(--sky); }
  .tab .tab-desc { display:block; font-size:9px; font-weight:200; opacity:0.6; margin-top:1px; }
  .tab.active {
    border-color:var(--green);
    background:var(--surface2);
    box-shadow:0 3px 14px rgba(76,175,125,0.2);
  }
  .tab.active .tab-name { color:var(--green); }

  /* Wim Hof level toggle */
  .level-toggle {
    display:none;
    gap:6px;
    width:100%;
  }
  .level-toggle.visible { display:flex; }
  .level-btn {
    flex:1;
    padding:9px;
    border:2px solid var(--surface2);
    border-radius:9px;
    background:var(--surface);
    color:var(--dim);
    font-family:'Heebo', sans-serif;
    font-size:11px;
    font-weight:400;
    cursor:pointer;
    transition:all 0.2s;
    text-align:center;
  }
  .level-btn.active {
    border-color:var(--green);
    color:var(--green);
    background:rgba(76,175,125,0.08);
  }

  /* Circle */
  .circle-wrap {
    position:relative;
    width:200px;
    height:200px;
  }
  .ring-svg {
    position:absolute;
    inset:0;
    transform:rotate(-90deg);
  }
  .ring-bg { fill:none; stroke:var(--surface2); stroke-width:9; }
  .ring-progress {
    fill:none;
    stroke:var(--green);
    stroke-width:9;
    stroke-linecap:round;
    stroke-dasharray:565;
    stroke-dashoffset:565;
    transition:stroke-dashoffset 0.1s linear, stroke 0.4s ease;
    filter:drop-shadow(0 0 9px rgba(76,175,125,0.5));
  }
  .ring-progress.exhale {
    stroke:var(--exhale);
    filter:drop-shadow(0 0 9px rgba(104,194,160,0.5));
  }
  .ring-progress.hold {
    stroke:var(--hold);
    filter:drop-shadow(0 0 9px rgba(240,192,96,0.5));
  }

  .circle-inner {
    position:absolute;
    inset:15px;
    border-radius:50%;
    background:var(--surface);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    border:1px solid rgba(76,175,125,0.12);
  }
  .phase-label {
    font-family:'Bebas Neue', sans-serif;
    font-size:22px;
    letter-spacing:0.1em;
    color:var(--green);
    transition:color 0.4s;
    line-height:1;
  }
  .phase-label.exhale { color:var(--exhale); }
  .phase-label.hold   { color:var(--hold); }
  .phase-label.paused { color:var(--dim); }

  .countdown {
    font-family:'Bebas Neue', sans-serif;
    font-size:60px;
    line-height:1;
    color:var(--white);
    letter-spacing:-0.02em;
  }
  .rep-counter {
    font-size:10px;
    font-weight:300;
    color:var(--dim);
    letter-spacing:0.1em;
  }

  /* Info strip */
  .info-strip {
    display:flex;
    width:100%;
    background:var(--surface);
    border-radius:11px;
    overflow:hidden;
    border:1px solid rgba(76,175,125,0.1);
  }
  .info-item {
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:9px 4px;
    gap:2px;
  }
  .info-item:not(:last-child) { border-left:1px solid rgba(76,175,125,0.1); }
  .info-value {
    font-family:'Bebas Neue', sans-serif;
    font-size:19px;
    color:var(--green);
    line-height:1;
  }
  .info-key {
    font-size:7px;
    color:var(--dim);
    letter-spacing:0.08em;
    text-transform:uppercase;
    font-weight:300;
  }

  /* Done */
  .done-msg { display:none; flex-direction:column; align-items:center; gap:4px; text-align:center; }
  .done-msg.show { display:flex; }
  .done-big {
    font-family:'Bebas Neue', sans-serif;
    font-size:38px;
    color:var(--green);
    letter-spacing:0.1em;
  }
  .done-sub { font-size:12px; color:var(--dim); font-weight:300; line-height:1.6; }

  /* ===== BUTTONS ===== */
  .btn-main {
    width:100%;
    padding:20px;
    border:none;
    border-radius:14px;
    font-family:'Bebas Neue', sans-serif;
    font-size:26px;
    letter-spacing:0.14em;
    cursor:pointer;
    transition:all 0.2s;
    background:var(--green);
    color:#0d1f12;
    box-shadow:0 5px 22px rgba(76,175,125,0.4);
  }
  .btn-main:active { transform:scale(0.97); }
  .btn-main.running {
    background:var(--red);
    color:#fff;
    box-shadow:0 5px 22px rgba(192,57,43,0.4);
  }

  .btn-secondary-row {
    display:flex;
    gap:10px;
    width:100%;
  }

  .btn-pause {
    flex:1;
    padding:14px;
    border:2px solid rgba(76,175,125,0.25);
    border-radius:12px;
    background:var(--surface2);
    color:var(--sky);
    font-family:'Bebas Neue', sans-serif;
    font-size:18px;
    letter-spacing:0.1em;
    cursor:pointer;
    transition:all 0.2s;
    opacity:0.4;
    pointer-events:none;
  }
  .btn-pause.active {
    opacity:1;
    pointer-events:all;
  }
  .btn-pause.active:active { transform:scale(0.97); }
  .btn-pause.paused {
    color:var(--green);
    border-color:var(--green);
    background:rgba(76,175,125,0.08);
    opacity:1;
    pointer-events:all;
  }

  /* Sound toggle */
  .sound-row {
    display:flex;
    align-items:center;
    gap:8px;
    align-self:flex-end;
  }
  .sound-label { font-size:11px; color:var(--dim); font-weight:300; }
  .sound-toggle {
    width:38px; height:20px;
    border-radius:10px;
    background:var(--surface2);
    border:none;
    cursor:pointer;
    position:relative;
    transition:background 0.2s;
  }
  .sound-toggle.on { background:var(--green); }
  .sound-toggle::after {
    content:'';
    position:absolute;
    top:3px; right:3px;
    width:14px; height:14px;
    border-radius:50%;
    background:#fff;
    transition:right 0.2s;
  }
  .sound-toggle.on::after { right:21px; }

  /* Pulse */
  @keyframes pulseGlow {
    0%,100% { box-shadow:0 0 0 0 var(--glow); }
    50%      { box-shadow:0 0 0 13px transparent; }
  }
  .circle-inner.pulsing { animation:pulseGlow 1.2s ease-in-out infinite; }
</style>
</head>
<body>
<div class="container">

  <div class="app-title">🌿 נשימה מכוונת</div>

  <div class="session-grid">
    <button class="tab active" id="tab0" onclick="selectSession(0)">
      <span class="tab-icon">☀️</span>
      <span class="tab-name">צהריים</span>
      <span class="tab-desc">5·3 × 8 — אנרגיה</span>
    </button>
    <button class="tab" id="tab1" onclick="selectSession(1)">
      <span class="tab-icon">⚡</span>
      <span class="tab-name">16:00</span>
      <span class="tab-desc">6·2 × 10 — עוררות</span>
    </button>
    <button class="tab" id="tab2" onclick="selectSession(2)">
      <span class="tab-icon">🛡️</span>
      <span class="tab-name">חיסון — מחלה</span>
      <span class="tab-desc">4·4·4·4 × 6 — ריפוי</span>
    </button>
    <button class="tab" id="tab3" onclick="selectSession(3)">
      <span class="tab-icon">💪</span>
      <span class="tab-name">חיסון — מניעה</span>
      <span class="tab-desc">Wim Hof — הפעלה</span>
    </button>
    <button class="tab" id="tab4" onclick="selectSession(4)">
      <span class="tab-icon">🧠</span>
      <span class="tab-name">פוקוס</span>
      <span class="tab-desc">4·8·5 × 8 — חידוד</span>
    </button>
    <button class="tab" id="tab5" onclick="selectSession(5)">
      <span class="tab-icon">🫁</span>
      <span class="tab-name">ריאות</span>
      <span class="tab-desc">נפח מלא × 6 — חיזוק</span>
    </button>
  </div>

  <!-- Wim Hof level toggle -->
  <div class="level-toggle" id="levelToggle">
    <button class="level-btn active" id="lvl0" onclick="selectLevel(0)">🔥 קל — 15 שאיפות</button>
    <button class="level-btn" id="lvl1" onclick="selectLevel(1)">🔥🔥 מלא — 20 שאיפות</button>
  </div>

  <div class="circle-wrap">
    <svg class="ring-svg" viewBox="0 0 200 200">
      <circle class="ring-bg" cx="100" cy="100" r="90"/>
      <circle class="ring-progress" id="ring" cx="100" cy="100" r="90"/>
    </svg>
    <div class="circle-inner" id="circleInner">
      <div class="phase-label" id="phaseLabel">מוכן</div>
      <div class="countdown" id="countdown">—</div>
      <div class="rep-counter" id="repCounter">בחר סדרה והתחל</div>
    </div>
  </div>

  <div class="info-strip">
    <div class="info-item">
      <div class="info-value" id="infoInhale">5</div>
      <div class="info-key">שאיפה</div>
    </div>
    <div class="info-item">
      <div class="info-value" id="infoHold">—</div>
      <div class="info-key">עצירה</div>
    </div>
    <div class="info-item">
      <div class="info-value" id="infoExhale">3</div>
      <div class="info-key">נשיפה</div>
    </div>
    <div class="info-item">
      <div class="info-value" id="infoReps">8</div>
      <div class="info-key">חזרות</div>
    </div>
    <div class="info-item">
      <div class="info-value" id="infoTotal">64″</div>
      <div class="info-key">סה״כ</div>
    </div>
  </div>

  <div class="done-msg" id="doneMsg">
    <div class="done-big">✓ כל הכבוד!</div>
    <div class="done-sub" id="doneSub"></div>
  </div>

  <!-- Big start button -->
  <button class="btn-main" id="startBtn" onclick="handleStart()">התחל</button>

  <!-- Secondary: pause + sound -->
  <div class="btn-secondary-row">
    <button class="btn-pause" id="pauseBtn" onclick="handlePause()">⏸ השהה</button>
    <div class="sound-row">
      <span class="sound-label">סאונד</span>
      <button class="sound-toggle on" id="soundToggle" onclick="toggleSound()"></button>
    </div>
  </div>

</div>

<script>
// ─── Audio ───────────────────────────────────────────────
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx = null;
let soundOn = true;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new AudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function playTone(freq, type, duration, fadeOut) {
  if (!soundOn) return;
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + duration);
  } catch(e) {}
}

function soundInhale() { playTone(528, 'sine', 0.5); }   // soft rising tone
function soundHold()   { playTone(396, 'triangle', 0.4); } // neutral
function soundExhale() { playTone(285, 'sine', 0.6); }   // soft falling tone

function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('soundToggle').className = 'sound-toggle' + (soundOn ? ' on' : '');
}

// ─── Sessions ────────────────────────────────────────────
// Each session has phases array: [{type, duration, label}]
// Special types: 'wim_inhales', 'wim_hold_empty', 'wim_hold_full'

function buildSessions(wimLevel) {
  const wimCount = wimLevel === 0 ? 15 : 20;
  const wimHold  = wimLevel === 0 ? 15 : 20;
  return [
    {
      id: 0,
      done: 'תרגיש את האנרגיה עוד שניות ספורות ☀️',
      reps: 8,
      phases: [
        { type:'inhale', dur:5 },
        { type:'exhale', dur:3 },
      ],
      info: { inhale:5, hold:'—', exhale:3, reps:8, total: 8*8 }
    },
    {
      id: 1,
      done: 'מערכת העצבים מופעלת ⚡',
      reps: 10,
      phases: [
        { type:'inhale', dur:6 },
        { type:'exhale', dur:2 },
      ],
      info: { inhale:6, hold:'—', exhale:2, reps:10, total: 10*8 }
    },
    {
      id: 2,
      done: 'הגוף מוכן להתמקד בריפוי 🛡️',
      reps: 6,
      phases: [
        { type:'inhale', dur:4 },
        { type:'hold',   dur:4 },
        { type:'exhale', dur:4 },
        { type:'hold',   dur:4 },
      ],
      info: { inhale:4, hold:4, exhale:4, reps:6, total: 6*16 }
    },
    {
      id: 3,
      done: 'מערכת החיסון מופעלת 💪',
      reps: 3,
      phases: [
        { type:'wim_inhales', count: wimCount },
        { type:'wim_hold_empty', dur: wimHold },
        { type:'wim_hold_full',  dur: 10 },
      ],
      info: { inhale: wimCount + '×', hold: wimHold + '"', exhale:'—', reps:3, total: '~4 דק' }
    },
    {
      id: 4,
      done: 'הראש צלול ומוכן לחשוב 🧠',
      reps: 8,
      phases: [
        { type:'inhale', dur:4 },
        { type:'hold',   dur:8 },
        { type:'exhale', dur:5 },
      ],
      info: { inhale:4, hold:8, exhale:5, reps:8, total: 8*17 }
    },
    {
      id: 5,
      done: 'ריאות חזקות יותר, נשימה עמוקה יותר 🫁',
      reps: 6,
      phases: [
        { type:'inhale3', dur:8 },  // 3+3+2 inhale
        { type:'hold',    dur:20 },
        { type:'exhale',  dur:8 },
      ],
      info: { inhale:'8(3×)', hold:20, exhale:8, reps:6, total: 6*36 }
    },
  ];
}

// ─── State ───────────────────────────────────────────────
let sessions = buildSessions(0);
let sessionIdx = 0;
let wimLevel = 0;
let running = false;
let paused  = false;
let intervalId = null;
let repsDone = 0;

// current phase execution
let phaseQueue = [];
let phaseQueueIdx = 0;
let subPhase = null; // for wim_inhales: current inhale count
let timeLeft = 0;
let phaseDuration = 0;

const CIRC = 2 * Math.PI * 90; // 565.5

const ring        = document.getElementById('ring');
const phaseLabel  = document.getElementById('phaseLabel');
const countdown   = document.getElementById('countdown');
const repCounter  = document.getElementById('repCounter');
const startBtn    = document.getElementById('startBtn');
const pauseBtn    = document.getElementById('pauseBtn');
const circleInner = document.getElementById('circleInner');
const doneMsg     = document.getElementById('doneMsg');
const doneSub     = document.getElementById('doneSub');

ring.style.strokeDasharray  = CIRC;
ring.style.strokeDashoffset = CIRC;

// ─── Session selection ───────────────────────────────────
function selectSession(idx) {
  if (running || paused) stopTimer();
  sessionIdx = idx;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.getElementById('levelToggle').className = 'level-toggle' + (idx===3 ? ' visible' : '');
  updateInfoStrip();
  resetDisplay();
}

function selectLevel(lvl) {
  wimLevel = lvl;
  sessions = buildSessions(lvl);
  document.getElementById('lvl0').className = 'level-btn' + (lvl===0 ? ' active' : '');
  document.getElementById('lvl1').className = 'level-btn' + (lvl===1 ? ' active' : '');
  updateInfoStrip();
  resetDisplay();
}

function updateInfoStrip() {
  const s = sessions[sessionIdx];
  const i = s.info;
  document.getElementById('infoInhale').textContent = i.inhale;
  document.getElementById('infoHold').textContent   = i.hold;
  document.getElementById('infoExhale').textContent = i.exhale;
  document.getElementById('infoReps').textContent   = i.reps;
  document.getElementById('infoTotal').textContent  = typeof i.total === 'number' ? i.total + '″' : i.total;
}

function resetDisplay() {
  phaseLabel.textContent = 'מוכן';
  phaseLabel.className = 'phase-label';
  countdown.textContent = '—';
  repCounter.textContent = 'בחר סדרה והתחל';
  ring.style.strokeDashoffset = CIRC;
  ring.className = 'ring-progress';
  circleInner.classList.remove('pulsing');
  doneMsg.classList.remove('show');
  startBtn.textContent = 'התחל';
  startBtn.className = 'btn-main';
  pauseBtn.className = 'btn-pause';
}

// ─── Controls ────────────────────────────────────────────
function handleStart() {
  if (running) { stopTimer(); }
  else { startTimer(); }
}

function handlePause() {
  if (!running && !paused) return;
  paused ? resumeTimer() : pauseTimer();
}

function startTimer() {
  running = true; paused = false; repsDone = 0;
  doneMsg.classList.remove('show');
  startBtn.textContent = 'עצור';
  startBtn.className = 'btn-main running';
  pauseBtn.className = 'btn-pause active';
  pauseBtn.textContent = '⏸ השהה';
  startRep();
}

function pauseTimer() {
  paused = true;
  clearInterval(intervalId);
  phaseLabel.textContent = 'השהיה';
  phaseLabel.className = 'phase-label paused';
  circleInner.classList.remove('pulsing');
  pauseBtn.textContent = '▶ המשך';
  pauseBtn.className = 'btn-pause paused';
}

function resumeTimer() {
  paused = false;
  pauseBtn.textContent = '⏸ השהה';
  pauseBtn.className = 'btn-pause active';
  // restore visual for current sub-phase
  if (subPhase) applySubPhaseStyle(subPhase);
  runInterval();
}

function stopTimer() {
  running = false; paused = false;
  clearInterval(intervalId);
  resetDisplay();
}

// ─── Rep & Phase execution ───────────────────────────────
function startRep() {
  const s = sessions[sessionIdx];
  phaseQueue = [...s.phases];
  phaseQueueIdx = 0;
  repCounter.textContent = `חזרה ${repsDone + 1} / ${s.reps}`;
  runNextPhase();
}

function runNextPhase() {
  if (!running || paused) return;
  if (phaseQueueIdx >= phaseQueue.length) {
    repsDone++;
    const s = sessions[sessionIdx];
    repCounter.textContent = `חזרה ${repsDone} / ${s.reps}`;
    if (repsDone >= s.reps) { finishSession(); return; }
    repCounter.textContent = `חזרה ${repsDone + 1} / ${s.reps}`;
    phaseQueue = [...s.phases];
    phaseQueueIdx = 0;
  }
  const phase = phaseQueue[phaseQueueIdx++];
  executePhase(phase);
}

function executePhase(phase) {
  if (phase.type === 'wim_inhales') {
    runWimInhales(phase.count, 0);
  } else if (phase.type === 'wim_hold_empty') {
    applySubPhaseStyle('wim_hold_empty');
    soundHold();
    runTimedPhase(phase.dur, 'wim_hold_empty');
  } else if (phase.type === 'wim_hold_full') {
    applySubPhaseStyle('wim_hold_full');
    soundHold();
    runTimedPhase(phase.dur, 'wim_hold_full');
  } else if (phase.type === 'inhale3') {
    runInhale3(phase.dur);
  } else if (phase.type === 'inhale') {
    applySubPhaseStyle('inhale');
    soundInhale();
    runTimedPhase(phase.dur, 'inhale');
  } else if (phase.type === 'exhale') {
    applySubPhaseStyle('exhale');
    soundExhale();
    runTimedPhase(phase.dur, 'exhale');
  } else if (phase.type === 'hold') {
    applySubPhaseStyle('hold');
    soundHold();
    runTimedPhase(phase.dur, 'hold');
  }
}

// Wim Hof rapid inhales
function runWimInhales(total, current) {
  if (!running || paused) { subPhase = { type:'wim_inhales', total, current }; return; }
  if (current >= total) { runNextPhase(); return; }
  subPhase = { type:'wim_inhales', total, current };
  applySubPhaseStyle('wim_inhale');
  countdown.textContent = total - current;
  repCounter.textContent = `שאיפה ${current+1} / ${total}`;
  soundInhale();
  // each wim inhale: 1.2 seconds
  phaseDuration = 1.2;
  timeLeft = 1.2;
  ring.style.strokeDashoffset = CIRC;
  clearInterval(intervalId);
  intervalId = setInterval(() => {
    timeLeft -= 0.1;
    ring.style.strokeDashoffset = CIRC * (timeLeft / phaseDuration);
    if (timeLeft <= 0.05) {
      clearInterval(intervalId);
      runWimInhales(total, current + 1);
    }
  }, 100);
}

// 3-part inhale for lung exercise (belly 3s + chest 3s + top 2s)
function runInhale3(totalDur) {
  const parts = [
    { label:'שאיפה — בטן', dur:3 },
    { label:'שאיפה — חזה', dur:3 },
    { label:'שאיפה — כתפיים', dur:2 },
  ];
  let partIdx = 0;
  applySubPhaseStyle('inhale');
  soundInhale();

  function runPart() {
    if (!running || paused) return;
    if (partIdx >= parts.length) { runNextPhase(); return; }
    const p = parts[partIdx++];
    phaseLabel.textContent = p.label;
    phaseLabel.className = 'phase-label';
    phaseDuration = p.dur;
    timeLeft = p.dur;
    ring.style.strokeDashoffset = CIRC;
    clearInterval(intervalId);
    intervalId = setInterval(() => {
      timeLeft -= 0.1;
      countdown.textContent = Math.ceil(timeLeft);
      ring.style.strokeDashoffset = CIRC * (timeLeft / phaseDuration);
      if (timeLeft <= 0.05) {
        clearInterval(intervalId);
        runPart();
      }
    }, 100);
  }
  runPart();
}

// Generic timed phase
function runTimedPhase(dur, styleType) {
  subPhase = styleType;
  phaseDuration = dur;
  timeLeft = dur;
  ring.style.strokeDashoffset = CIRC;
  clearInterval(intervalId);
  runInterval();
}

function runInterval() {
  intervalId = setInterval(() => {
    timeLeft -= 0.1;
    countdown.textContent = Math.ceil(timeLeft);
    ring.style.strokeDashoffset = CIRC * (timeLeft / phaseDuration);
    if (timeLeft <= 0.05) {
      clearInterval(intervalId);
      runNextPhase();
    }
  }, 100);
}

// ─── Visual styles ───────────────────────────────────────
function applySubPhaseStyle(type) {
  circleInner.classList.remove('pulsing');
  switch(type) {
    case 'inhale':
      phaseLabel.textContent = 'שאיפה';
      phaseLabel.className = 'phase-label';
      ring.className = 'ring-progress';
      circleInner.classList.add('pulsing');
      break;
    case 'exhale':
      phaseLabel.textContent = 'נשיפה';
      phaseLabel.className = 'phase-label exhale';
      ring.className = 'ring-progress exhale';
      break;
    case 'hold':
      phaseLabel.textContent = 'עצור';
      phaseLabel.className = 'phase-label hold';
      ring.className = 'ring-progress hold';
      break;
    case 'wim_inhale':
      phaseLabel.textContent = 'שאיפה מהירה';
      phaseLabel.className = 'phase-label';
      ring.className = 'ring-progress';
      circleInner.classList.add('pulsing');
      break;
    case 'wim_hold_empty':
      phaseLabel.textContent = 'ריאות ריקות';
      phaseLabel.className = 'phase-label hold';
      ring.className = 'ring-progress hold';
      break;
    case 'wim_hold_full':
      phaseLabel.textContent = 'ריאות מלאות';
      phaseLabel.className = 'phase-label hold';
      ring.className = 'ring-progress hold';
      break;
  }
}

// ─── Finish ──────────────────────────────────────────────
function finishSession() {
  running = false; paused = false;
  clearInterval(intervalId);
  const s = sessions[sessionIdx];
  phaseLabel.textContent = 'סיום';
  phaseLabel.className = 'phase-label';
  countdown.textContent = '✓';
  circleInner.classList.remove('pulsing');
  ring.style.strokeDashoffset = 0;
  doneSub.textContent = s.done;
  doneMsg.classList.add('show');
  startBtn.textContent = 'שוב';
  startBtn.className = 'btn-main';
  pauseBtn.className = 'btn-pause';
}

document.addEventListener('touchstart', () => { try { getAudioCtx(); } catch(e){} }, { once: true });
document.addEventListener('click',      () => { try { getAudioCtx(); } catch(e){} }, { once: true });

updateInfoStrip();
